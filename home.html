<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClassroomAI — ระบบจัดการการเรียนรู้</title>
  <link rel="stylesheet" href="css/theme.css" />
  <script>
    (function () {
      try {
        var m = localStorage.getItem('ca-theme') || 'system';
        var dark = m === 'dark' || (m === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
      } catch (e) {}
    })();
  </script>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="js/data.jsx"></script>
  <script type="text/babel" src="js/ui.jsx"></script>
  <script type="text/babel" src="js/layout.jsx"></script>
  <script type="text/babel" src="js/screens_dashboard.jsx"></script>
  <script type="text/babel" src="js/screens_course.jsx"></script>
  <script type="text/babel" src="js/screens_detail.jsx"></script>
  <script type="text/babel" src="js/screens_assignment.jsx"></script>
  <script type="text/babel" src="js/app.jsx"></script>
</body>
</html>
