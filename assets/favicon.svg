<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Chalkboard body -->
  <rect x="1" y="3" width="30" height="22" rx="3" ry="3" fill="#1e3a2f"/>
  <!-- Board frame highlight -->
  <rect x="1" y="3" width="30" height="22" rx="3" ry="3" fill="none" stroke="#4a7c5c" stroke-width="1.5"/>
  <!-- Chalk tray -->
  <rect x="3" y="24" width="26" height="3" rx="1.5" fill="#2d5a40"/>
  <!-- Chalk piece in tray -->
  <rect x="6" y="24.8" width="6" height="1.4" rx="0.7" fill="#c8e6c9" opacity="0.7"/>
  <!-- AI sparkle: large center star -->
  <path d="M16 8 L17 12.5 L21.5 13.5 L17 14.5 L16 19 L15 14.5 L10.5 13.5 L15 12.5 Z" fill="#ffffff"/>
  <!-- Small sparkle top-right -->
  <path d="M22 8 L22.6 10 L24.5 10.5 L22.6 11 L22 13 L21.4 11 L19.5 10.5 L21.4 10 Z" fill="#a5f3c4" opacity="0.9"/>
  <!-- Tiny dot sparkle bottom-left -->
  <circle cx="11" cy="18" r="1" fill="#a5f3c4" opacity="0.7"/>
  <circle cx="8.5" cy="10.5" r="0.7" fill="#ffffff" opacity="0.5"/>
</svg>
